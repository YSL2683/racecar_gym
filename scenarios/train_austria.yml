world:
  name: austria
agents:
  - id: A
    vehicle:
      name: racecar
      sensors: [lidar, pose, velocity, acceleration]
      actuators: [motor, steering]
      color: blue
    task:
      task_name: dqn_progress
      params: {laps: 1, time_limit: 120.0,
               terminate_on_collision: False,
               progress_reward: 1000.0,
               motor_weight: 0.1,
               action_change_penalty: -0.01,
               collision_penalty: 0.0,
               }
